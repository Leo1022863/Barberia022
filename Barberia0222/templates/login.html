{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="form-card">
        <h1 class="brand-title">Barbería 022</h1>
        <p class="form-subtitle">Inicia sesión para gestionar tus citas</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert-success">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="nombre@correo.com"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn-primary">ENTRAR</button>
        </form>

        <div class="form-footer">
            ¿No tienes cuenta? <a href="{{ url_for('auth.registro') }}">Regístrate aquí</a>
        </div>
    </div>
</div>
{% endblock %}

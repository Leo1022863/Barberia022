{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="form-card">
        <h1 class="brand-title">Barbería 022</h1>
        <p class="form-subtitle">Excelencia en cada corte</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert" style="color: #ff4444; background: rgba(255,68,68,0.1); border: 1px solid #ff4444; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-size: 0.85rem;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.registro') }}" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej. Leonardo" required>
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" class="form-control" placeholder="Ej. Angamarca" required>
                </div>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono / WhatsApp</label>
                <input type="tel" id="telefono" name="telefono" class="form-control" placeholder="Ej. 0987654321" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="nombre@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Registrarse</button>
        </form>

        <div class="form-footer">
            ¿Ya eres cliente? <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
        </div>
    </div>
</div>
{% endblock %}

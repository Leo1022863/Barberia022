{% extends "base.html" %}
{% block title %}Editar Usuario - Barbería 022{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="form-card p-4 w-100" style="max-width: 550px; background: rgba(20, 20, 20, 0.95); border: 1px solid #c9a84c; border-radius: 15px;">
        <h3 style="color: #c9a84c;" class="mb-4 text-center text-uppercase"><i class="fas fa-user-edit me-2"></i>Modificar Información</h3>
        
        <form action="{{ url_for('auth.editar_usuario_view', usuario_id=usuario.id_usuario) }}" method="POST">
            <div class="mb-3">
                <label class="form-label text-white-50">Nombre</label>
                <input type="text" name="nombre" class="form-control bg-dark text-white border-secondary" value="{{ usuario.nombre }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-white-50">Apellido</label>
                <input type="text" name="apellido" class="form-control bg-dark text-white border-secondary" value="{{ usuario.apellido }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-white-50">Correo Electrónico</label>
                <input type="email" name="email" class="form-control bg-dark text-white border-secondary" value="{{ usuario.email }}" required>
            </div>
            <div class="d-flex gap-2 justify-content-end mt-4">
                <a href="{{ url_for('auth.admin_dashboard') }}" class="btn btn-secondary">Volver al Panel</a>
                <button type="submit" class="btn" style="background: #c9a84c; color: #000; font-weight: bold;">GUARDAR CAMBIOS</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
